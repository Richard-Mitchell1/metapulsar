name: Python package CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  release:
    types: [published]

jobs:
  tests:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ['3.9', '3.10', '3.11', '3.12']
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install non-python dependencies on mac
        if: runner.os == 'macOS'
        run: |
          brew unlink gcc && brew link gcc
          brew install automake suite-sparse
      - name: Install non-python dependencies on linux
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libsuitesparse-dev
      - name: Install dependencies
        env:
          SUITESPARSE_INCLUDE_DIR: "/usr/local/opt/suite-sparse/include/suitesparse/"
          SUITESPARSE_LIBRARY_DIR: "/usr/local/opt/suite-sparse/lib"
        run: |
          python -m pip install --upgrade pip "setuptools<81" wheel
          pip install black==25.11.0 pytest pytest-cov
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        shell: bash
      - name: Lint with black
        run: |
          black . --check
      - name: Install package in editable mode
        run: pip install -e ".[dev]"
        shell: bash
      - name: Run tests with pytest
        env:
          PYTEST_ADDOPTS: -m "not requires_libstempo and not requires_ipta_data and not legacy_comparison"
        run: |
          pytest --cov=src/metapulsar --cov-report xml:coverage.xml
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: true

  build:
    needs: tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'
      - name: Install non-python dependencies on linux
        run: |
          sudo apt-get update
          sudo apt-get install -y libsuitesparse-dev
      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip "setuptools<81" wheel build
      - name: Build package
        run: python -m build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: |
            ./dist/*.whl
            ./dist/*.tar.gz

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'
      - name: Download built distributions
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: ./dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
          skip_existing: true

